<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประกอบร่างและลงสีไอเทม: ขวดยาเวทมนตร์ 3 มิติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { prompt: ['Prompt','sans-serif'] } } } }</script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Prompt', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* สไตล์ Slider สีชมพูอมแดง (Potion vibe) */
        input[type=range] { accent-color: #ec4899; }
        
        /* สไตล์ Color Picker */
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 36px; height: 36px;
            border-radius: 12px; cursor: pointer; padding: 0; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #ffffff; border-radius: 12px; }

        /* ป้องกันข้อความโดนตัด */
        .no-truncate { white-space: normal; word-wrap: break-word; }
    </style>
</head>
<body class="text-slate-800">

    <div class="absolute top-6 right-6 w-80 bg-white/80 backdrop-blur-xl p-6 rounded-[2rem] shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] border border-white/40 z-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
        <h2 class="text-xl font-bold mb-5 text-slate-800 flex items-center gap-3 no-truncate leading-tight">
            <span class="p-2.5 bg-pink-100 text-pink-600 rounded-2xl shadow-sm">🧪</span> ประกอบร่าง: ขวดยาเวทมนตร์
        </h2>
        
        <div class="mb-6 p-4 bg-white/60 rounded-2xl border border-white/50 shadow-sm">
            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-sm font-bold text-slate-700">โหมดแยกชิ้นส่วน</span>
                </div>
                <input type="range" id="explodeSlider" min="0" max="2" step="0.1" value="0" class="w-full">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1">
                    <span class="text-sm font-bold text-slate-700">ปริมาณน้ำยา (Fill Level)</span>
                </div>
                <input type="range" id="fillSlider" min="0.1" max="1" step="0.05" value="0.7" class="w-full" style="accent-color: #8b5cf6;">
            </div>
            <p class="text-[11px] text-slate-500 mt-3 leading-tight font-medium">ขวดยาประกอบด้วยรูปทรงที่ซ้อนทับกัน (ขวดแก้วโปร่งแสง และ น้ำยาทึบแสง)</p>
        </div>

        <div>
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 pl-1">ระบายสี (Texturing)</p>
            <div class="space-y-3">
                <div class="flex items-center justify-between bg-white/80 p-2.5 rounded-xl border border-white shadow-sm hover:shadow-md transition-all">
                    <span class="text-sm font-bold text-slate-700 pl-2">สีน้ำยา (Liquid)</span>
                    <input type="color" id="colorLiquid" value="#ec4899">
                </div>
                <div class="flex items-center justify-between bg-white/80 p-2.5 rounded-xl border border-white shadow-sm hover:shadow-md transition-all">
                    <span class="text-sm font-bold text-slate-700 pl-2">สีเนื้อแก้ว (Glass)</span>
                    <input type="color" id="colorGlass" value="#e2e8f0">
                </div>
                <div class="flex items-center justify-between bg-white/80 p-2.5 rounded-xl border border-white shadow-sm hover:shadow-md transition-all">
                    <span class="text-sm font-bold text-slate-700 pl-2">จุกก๊อก (Cork)</span>
                    <input type="color" id="colorCork" value="#854d0e">
                </div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-6 left-6 bg-white/80 backdrop-blur-xl px-5 py-3.5 rounded-2xl shadow-lg border border-white/40 z-10 flex items-center gap-3">
        <div class="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center text-pink-600 font-bold text-xl">🖱️</div>
        <div>
            <p class="text-sm font-bold text-slate-800">หมุนมุมมอง: <span class="text-slate-500 font-normal text-xs">คลิกซ้ายลาก</span></p>
            <p class="text-sm font-bold text-slate-800">ซูมภาพ: <span class="text-slate-500 font-normal text-xs">เลื่อนลูกกลิ้งเมาส์</span></p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 1. ตั้งค่า Scene 
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 5, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.5, 0);

        // 2. จัดแสง (เน้นแสงสว่างเพื่อให้เห็นความโปร่งแสงของแก้ว)
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        
        // เพิ่ม PointLight ให้ดูเหมือนน้ำยาเรืองแสงนิดๆ
        const glowLight = new THREE.PointLight(0xec4899, 1, 10);
        glowLight.position.set(0, 1, 0);
        scene.add(glowLight);

        // 3. เส้นตาราง
        const gridHelper = new THREE.GridHelper(10, 10, 0x334155, 0x1e293b);
        scene.add(gridHelper);

        // 4. วัสดุ (Materials)
        // เนื้อแก้ว: ปรับค่า transparent และ opacity ให้มองทะลุได้
        const matGlass = new THREE.MeshStandardMaterial({ 
            color: 0xe2e8f0, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.4 
        });
        // น้ำยา: สีสดใส มี emissive (เรืองแสงด้วยตัวเองเล็กน้อย)
        const matLiquid = new THREE.MeshStandardMaterial({ 
            color: 0xec4899, roughness: 0.3, emissive: 0xec4899, emissiveIntensity: 0.5 
        });
        // จุกไม้ก๊อก
        const matCork = new THREE.MeshStandardMaterial({ color: 0x854d0e, roughness: 0.9 });

        // 5. สร้างชิ้นส่วนขวดยา (Prop Assembly)
        const potionGroup = new THREE.Group();

        // 5.1 ตัวขวดด้านล่าง (Body)
        const geoBody = new THREE.BoxGeometry(1.6, 1.6, 1.6);
        const glassBody = new THREE.Mesh(geoBody, matGlass);
        glassBody.position.y = 0.8;
        potionGroup.add(glassBody);

        // 5.2 คอขวด (Neck)
        const geoNeck = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const glassNeck = new THREE.Mesh(geoNeck, matGlass);
        glassNeck.position.y = 2.0;
        potionGroup.add(glassNeck);

        // 5.3 ปากขวด (Rim)
        const geoRim = new THREE.BoxGeometry(1.0, 0.2, 1.0);
        const glassRim = new THREE.Mesh(geoRim, matGlass);
        glassRim.position.y = 2.5;
        potionGroup.add(glassRim);

        // 5.4 จุกก๊อก (Cork)
        const geoCork = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const cork = new THREE.Mesh(geoCork, matCork);
        cork.position.y = 2.8;
        potionGroup.add(cork);

        // 5.5 น้ำยาเวทมนตร์ (Liquid) - สร้างกล่องที่เล็กกว่าตัวขวดเล็กน้อยซ้อนไว้ข้างใน
        const liquidBaseY = 0.1; // ฐานของน้ำยา
        const liquidMaxHeight = 1.4; // ความสูงสูงสุดของน้ำยา
        const geoLiquid = new THREE.BoxGeometry(1.4, liquidMaxHeight, 1.4);
        
        // ย้าย Pivot ของน้ำยามาไว้ที่ฐาน เพื่อให้เวลาย่อขยาย (Scale) น้ำยาจะลดระดับลงไปที่ก้นขวด ไม่ใช่หดเข้าหากึ่งกลาง
        geoLiquid.translate(0, liquidMaxHeight / 2, 0); 
        
        const liquid = new THREE.Mesh(geoLiquid, matLiquid);
        liquid.position.y = liquidBaseY;
        
        // ตั้งค่าปริมาณน้ำยาเริ่มต้น
        liquid.scale.y = 0.7; 
        potionGroup.add(liquid);

        scene.add(potionGroup);

        // 6. ระบบโต้ตอบ (Interactions)
        
        // ควบคุมการแยกชิ้นส่วน
        document.getElementById('explodeSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            cork.position.y = 2.8 + (val * 2.5);
            glassRim.position.y = 2.5 + (val * 1.5);
            glassNeck.position.y = 2.0 + (val * 1.5);
            liquid.position.y = liquidBaseY + (val * 0.8);
            glassBody.position.y = 0.8; 
        });

        // ควบคุมปริมาณน้ำยา
        document.getElementById('fillSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            liquid.scale.y = val;
        });

        // ควบคุมสี
        document.getElementById('colorLiquid').addEventListener('input', (e) => {
            const hex = e.target.value;
            matLiquid.color.set(hex);
            matLiquid.emissive.set(hex);
            glowLight.color.set(hex); // ให้แสงเรืองแสงเปลี่ยนสีตามน้ำยา
        });
        document.getElementById('colorGlass').addEventListener('input', (e) => matGlass.color.set(e.target.value));
        document.getElementById('colorCork').addEventListener('input', (e) => matCork.color.set(e.target.value));

        // 7. Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
