<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำรวจโครงสร้างตัวละคร 3 มิติ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sarabun: ['Sarabun','sans-serif'], outfit: ['Outfit','sans-serif'] } } } }</script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Sarabun', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        input[type=range] { accent-color: #10b981; } /* สี emerald-500 */
        
        /* ตกแต่ง Checkbox ให้ดูเป็นสวิตช์ */
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
    </style>
</head>
<body class="text-slate-800">

    <div class="absolute top-4 right-4 w-80 bg-white/95 backdrop-blur-md p-6 rounded-[2rem] shadow-2xl border border-slate-200 z-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
        <h2 class="text-xl font-bold font-outfit tracking-tighter mb-4 text-slate-800 flex items-center gap-2">
            <span class="p-2 bg-emerald-50 text-emerald-500 rounded-xl">🧍‍♂️</span> โครงสร้างตัวละคร
        </h2>
        
        <div class="mb-6">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">แสดงผลชิ้นส่วน (Visibility)</p>
            <div class="space-y-2">
                <label class="flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition-colors">
                    <span class="text-sm font-bold text-slate-700">ส่วนหัว (Head)</span>
                    <input type="checkbox" id="showHead" checked class="w-4 h-4 accent-emerald-500 rounded">
                </label>
                <label class="flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition-colors">
                    <span class="text-sm font-bold text-slate-700">ลำตัว (Torso)</span>
                    <input type="checkbox" id="showTorso" checked class="w-4 h-4 accent-emerald-500 rounded">
                </label>
                <label class="flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition-colors">
                    <span class="text-sm font-bold text-slate-700">แขนสองข้าง (Arms)</span>
                    <input type="checkbox" id="showArms" checked class="w-4 h-4 accent-emerald-500 rounded">
                </label>
                <label class="flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-100 transition-colors">
                    <span class="text-sm font-bold text-slate-700">ขาสองข้าง (Legs)</span>
                    <input type="checkbox" id="showLegs" checked class="w-4 h-4 accent-emerald-500 rounded">
                </label>
            </div>
        </div>

        <div class="mb-4">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">ปรับสัดส่วน (Proportions)</p>
            <div class="space-y-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-slate-600">ขนาดหัว</span>
                        <span id="headScaleVal" class="text-xs text-emerald-500 font-bold">100%</span>
                    </div>
                    <input type="range" id="headScale" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-bold text-slate-600">ความกว้างไหล่</span>
                        <span id="shoulderWidthVal" class="text-xs text-emerald-500 font-bold">ปกติ</span>
                    </div>
                    <input type="range" id="shoulderWidth" min="0.6" max="1.4" step="0.1" value="0.8" class="w-full">
                </div>
            </div>
        </div>
        
        <button onclick="resetCharacter()" class="w-full py-3 mt-2 rounded-xl text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all uppercase tracking-widest">รีเซ็ตสัดส่วน</button>

    </div>

    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur px-5 py-3 rounded-2xl shadow-lg border border-slate-200 z-10 flex items-center gap-3">
        <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500">💡</div>
        <div>
            <p class="text-xs font-bold text-slate-800">T-Pose <span class="text-slate-500 font-normal">คือท่าพื้นฐานสำหรับการขึ้นโมเดลตัวละคร</span></p>
            <p class="text-[10px] text-slate-400">ช่วยให้การใส่กระดูก (Rigging) ในบทถัดไปทำได้ง่ายขึ้น</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // 1. ตั้งค่า Scene, Camera, Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0); // โฟกัสไปที่กลางลำตัว

        // 2. จัดแสง (Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // 3. เส้นตารางพื้น
        const gridHelper = new THREE.GridHelper(10, 10, 0x475569, 0x334155);
        scene.add(gridHelper);

        // 4. สร้างชิ้นส่วนตัวละคร
        const characterGroup = new THREE.Group();

        // วัสดุสีต่างๆ (อ้างอิงจากภาพของคุณครูก่อนหน้านี้)
        const headMat = new THREE.MeshStandardMaterial({ color: 0xedaa45, roughness: 0.6 });
        const torsoMat = new THREE.MeshStandardMaterial({ color: 0x4f8cf5, roughness: 0.6 });
        const armMat = new THREE.MeshStandardMaterial({ color: 0x93b7f0, roughness: 0.6 });
        const legMat = new THREE.MeshStandardMaterial({ color: 0xa46df2, roughness: 0.6 });

        // ส่วนหัว (Head)
        const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), headMat);
        head.position.set(0, 3.5, 0);
        characterGroup.add(head);

        // ลำตัว (Torso)
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.6), torsoMat);
        torso.position.set(0, 2.25, 0);
        characterGroup.add(torso);

        // แขน (Arms)
        const armsGroup = new THREE.Group();
        const armGeo = new THREE.BoxGeometry(0.4, 1.4, 0.4);
        const leftArm = new THREE.Mesh(armGeo, armMat);
        const rightArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(0.8, 2.2, 0);
        rightArm.position.set(-0.8, 2.2, 0);
        armsGroup.add(leftArm);
        armsGroup.add(rightArm);
        characterGroup.add(armsGroup);

        // ขา (Legs)
        const legsGroup = new THREE.Group();
        const legGeo = new THREE.BoxGeometry(0.55, 1.5, 0.5);
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(0.3, 0.75, 0);
        rightLeg.position.set(-0.3, 0.75, 0);
        legsGroup.add(leftLeg);
        legsGroup.add(rightLeg);
        characterGroup.add(legsGroup);

        scene.add(characterGroup);

        // 5. ระบบโต้ตอบ (Interactivity)

        // ควบคุมการแสดงผล (Visibility)
        document.getElementById('showHead').addEventListener('change', e => head.visible = e.target.checked);
        document.getElementById('showTorso').addEventListener('change', e => torso.visible = e.target.checked);
        document.getElementById('showArms').addEventListener('change', e => armsGroup.visible = e.target.checked);
        document.getElementById('showLegs').addEventListener('change', e => legsGroup.visible = e.target.checked);

        // ควบคุมสัดส่วน (Proportions)
        const headScaleSlider = document.getElementById('headScale');
        const headScaleVal = document.getElementById('headScaleVal');
        headScaleSlider.addEventListener('input', e => {
            const val = parseFloat(e.target.value);
            head.scale.set(val, val, val);
            headScaleVal.textContent = Math.round(val * 100) + '%';
            // ขยับหัวขึ้นลงตามสัดส่วน
            head.position.y = 3.0 + (val * 0.5); 
        });

        const shoulderSlider = document.getElementById('shoulderWidth');
        const shoulderVal = document.getElementById('shoulderWidthVal');
        shoulderSlider.addEventListener('input', e => {
            const val = parseFloat(e.target.value);
            leftArm.position.x = val;
            rightArm.position.x = -val;
            
            if(val === 0.8) shoulderVal.textContent = "ปกติ";
            else if(val > 0.8) shoulderVal.textContent = "กว้าง";
            else shoulderVal.textContent = "แคบ";
        });

        // รีเซ็ตค่า
        window.resetCharacter = function() {
            headScaleSlider.value = 1.0;
            head.scale.set(1, 1, 1);
            head.position.y = 3.5;
            headScaleVal.textContent = '100%';

            shoulderSlider.value = 0.8;
            leftArm.position.x = 0.8;
            rightArm.position.x = -0.8;
            shoulderVal.textContent = 'ปกติ';
        };

        // 6. การ Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 7. Responsive Window
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
