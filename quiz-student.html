<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบสอบออนไลน์</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sarabun: ['Sarabun','sans-serif'], outfit: ['Outfit','sans-serif'] } } } }</script>
  <link rel="stylesheet" href="quiz-style.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = { apiKey: "AIzaSyAHAe6Q4TRjChkJuZ-z7ZT2N23Qm8Aun6U", authDomain: "wkk69-54b7c.firebaseapp.com", projectId: "wkk69-54b7c", storageBucket: "wkk69-54b7c.firebasestorage.app", messagingSenderId: "996097508438", appId: "1:996097508438:web:5bcef61e99ed3e8ba727f7" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
</head>
<body class="h-full bg-slate-50 flex flex-col">
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-500 transition-colors"><i data-lucide="home" class="w-5 h-5"></i></a>
                <div><h1 class="text-xl font-bold text-slate-800 font-outfit">E-Testing</h1><p class="text-xs text-indigo-500 font-bold">ระบบสอบออนไลน์</p></div>
            </div>
            <div id="student-header-info" class="hidden text-right">
                <p id="sh-name" class="text-sm font-bold text-slate-800">-</p>
                <p id="sh-id" class="text-xs text-slate-400 font-medium">-</p>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto w-full max-w-3xl mx-auto p-4 custom-scrollbar">
        <div id="view-login" class="bg-white rounded-[2rem] p-8 sm:p-12 border border-slate-200 shadow-xl mt-10 max-w-md mx-auto text-center slide-up relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <div class="w-20 h-20 bg-indigo-50 rounded-3xl mx-auto flex items-center justify-center mb-6 border border-indigo-100"><i data-lucide="user-check" class="w-10 h-10 text-indigo-600"></i></div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2 font-outfit tracking-tighter">เข้าสู่ระบบสอบ</h2>
            <p class="text-sm text-slate-500 mb-8">กรอกรหัสนักเรียนเพื่อตรวจสอบวิชาที่เปิดสอบ</p>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="login-id" required class="w-full text-center text-2xl font-bold font-outfit tracking-wider px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 mb-4" placeholder="Student ID">
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all uppercase tracking-widest flex justify-center items-center gap-2"><i data-lucide="arrow-right" class="w-4 h-4"></i> ถัดไป</button>
            </form>
        </div>

        <div id="view-quiz-list" class="hidden slide-up mt-6">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="clipboard-list" class="w-5 h-5 text-indigo-500"></i> ข้อสอบที่เปิดให้ทำ</h2>
            <div id="student-quizzes" class="grid gap-4"></div>
        </div>

        <div id="view-playing" class="hidden slide-up mt-2 pb-10">
            <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm mb-6 flex justify-between items-center sticky top-20 z-30">
                <div>
                    <h2 id="play-title" class="text-lg font-bold text-slate-800">-</h2>
                    <p id="play-course" class="text-xs text-slate-500 font-bold uppercase tracking-widest">-</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">ความคืบหน้า</p>
                    <p class="text-lg font-bold text-indigo-600 font-outfit"><span id="play-current">0</span> / <span id="play-total">0</span></p>
                </div>
            </div>
            
            <div id="play-questions" class="space-y-6"></div>

            <button onclick="confirmSubmitQuiz()" id="btn-submit-quiz" class="w-full mt-8 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-5 rounded-[2rem] shadow-xl shadow-emerald-200 transition-all text-lg flex justify-center items-center gap-3">
                <i data-lucide="send" class="w-6 h-6"></i> ส่งคำตอบ
            </button>
        </div>
    </main>
    <div id="custom-confirm-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden bg-slate-900/50 backdrop-blur-sm transition-opacity opacity-0 duration-300">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm text-center border border-slate-200 shadow-2xl relative overflow-hidden transform scale-95 transition-transform duration-300" id="custom-confirm-box">
            <div id="confirm-color-bar" class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
            <div id="confirm-icon-container" class="w-20 h-20 rounded-3xl bg-emerald-50 flex items-center justify-center mx-auto mb-6 border border-emerald-100">
                <i id="confirm-icon" data-lucide="send" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <h3 id="confirm-title" class="font-bold text-slate-800 mb-3 text-2xl font-outfit tracking-tighter">ส่งคำตอบ</h3>
            <p id="confirm-message" class="text-sm text-slate-500 mb-8 leading-relaxed px-2">ยืนยันการส่งคำตอบ? (เมื่อส่งแล้วจะไม่สามารถแก้ไขได้อีก)</p>
            <div class="flex gap-4">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-500 py-3.5 rounded-2xl text-xs font-bold transition-all uppercase tracking-widest">ยกเลิก</button>
                <button id="btn-confirm-action" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-2xl text-xs font-bold transition-all shadow-lg shadow-emerald-200 uppercase tracking-widest">ยืนยันส่ง</button>
            </div>
        </div>
    </div>
    <script src="quiz-student.js"></script>
</body>
</html>
